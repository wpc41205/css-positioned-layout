<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <header class="chatroom-header">
    Techup Chatroom
  </header>
  <main class="chatroom-main">
    <section class="chat-left">
      <div class="chat-bubble chat-bubble-left">
        <span role="img" aria-label="smiling face with heart-eyes">😍</span>
      </div>
      <div class="chat-bubble chat-bubble-left">
        <span role="img" aria-label="smiling face with smiling eyes">☺️</span>
      </div>
    </section>
    <section class="chat-right">
      <div class="chat-bubble chat-bubble-right chat-bubble-green">
        <span>สวัสดีจ้า</span>
      </div>
      <div class="chat-bubble chat-bubble-right chat-bubble-gray">
        <span>Coding สนุกจังเลย</span>
        <button class="close-btn" aria-label="ปิดข้อความ">×</button>
      </div>
      <div class="chat-bubble chat-bubble-right chat-bubble-green">
        <span role="img" aria-label="smiling face with smiling eyes">☺️</span>
        <span role="img" aria-label="smiling face with heart-eyes">😍</span>
      </div>
    </section>
  </main>
</body>

</html>
